<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐑 ねむりの羊スタンプカード</title>
<!-- GitHub Pages + Google Sheets 連携版 -->
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&family=Zen+Maru+Gothic:wght@400;500;700&display=swap');

  :root {
    --pink: #ffb3c6; --pink2: #ff8fab;
    --lavender: #c8b4e8; --lav2: #a890d8;
    --green: #a8d8a8; --green2: #7bc47b;
    --gold: #f0c040;
    --text: #4a3728; --sub: #8a7060;
    --shadow: rgba(74,55,40,0.14);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Zen Maru Gothic', 'Nunito', sans-serif;
    background: linear-gradient(160deg, #dff0ff 0%, #f4e8ff 55%, #ffe4f0 100%);
    min-height: 100vh;
    display: flex; flex-direction: column; align-items: center;
    padding: 18px 14px 48px;
    overflow-x: hidden;
  }

  .clouds { position:fixed; inset:0; pointer-events:none; z-index:0; overflow:hidden; }
  .cloud { position:absolute; background:white; border-radius:50px; opacity:0.45; animation:floatCloud linear infinite; }
  .cloud::before,.cloud::after { content:''; position:absolute; background:white; border-radius:50%; }
  .cloud:nth-child(1){width:120px;height:40px;top:7%;left:-140px;animation-duration:36s;}
  .cloud:nth-child(1)::before{width:60px;height:60px;top:-26px;left:14px;}
  .cloud:nth-child(1)::after{width:42px;height:42px;top:-16px;left:52px;}
  .cloud:nth-child(2){width:80px;height:28px;top:18%;left:-100px;animation-duration:28s;animation-delay:-12s;opacity:0.32;}
  .cloud:nth-child(2)::before{width:40px;height:40px;top:-18px;left:10px;}
  .cloud:nth-child(2)::after{width:28px;height:28px;top:-10px;left:35px;}
  .cloud:nth-child(3){width:100px;height:34px;top:4%;left:-120px;animation-duration:44s;animation-delay:-22s;opacity:0.38;}
  .cloud:nth-child(3)::before{width:50px;height:50px;top:-22px;left:12px;}
  .cloud:nth-child(3)::after{width:36px;height:36px;top:-14px;left:44px;}
  @keyframes floatCloud { to { transform:translateX(calc(100vw + 200px)); } }

  .app { position:relative; z-index:1; width:100%; max-width:420px; }

  .header { text-align:center; margin-bottom:20px; }
  .header h1 { font-size:1.75rem; font-weight:900; color:var(--text); text-shadow:2px 2px 0 white,3px 3px 0 rgba(0,0,0,0.07); }
  .header p { font-size:0.82rem; color:var(--sub); margin-top:5px; font-weight:500; }

  .card {
    background:white; border-radius:32px;
    padding:24px 20px 20px;
    box-shadow:0 8px 40px var(--shadow), inset 0 1px 0 rgba(255,255,255,0.9);
    border:2px solid rgba(255,255,255,0.85);
    margin-bottom:18px;
  }

  .stage-badge {
    display:flex; align-items:center; justify-content:center; gap:8px;
    padding:8px 16px; border-radius:99px; font-size:0.82rem; font-weight:700;
    margin-bottom:16px; transition:all 0.6s;
  }

  .sheep-scene { display:flex; flex-direction:column; align-items:center; margin-bottom:18px; }
  .sheep-wrapper {
    cursor:pointer; display:inline-block; user-select:none;
    transition:transform 0.2s; position:relative;
  }
  .sheep-wrapper:active { transform:scale(0.93)!important; }
  .sheep-svg { width:210px; height:210px; filter:drop-shadow(0 6px 14px rgba(0,0,0,0.11)); overflow:visible; }

  .tap-hint { font-size:0.78rem; color:var(--pink2); font-weight:700; margin-top:8px; animation:pulse 2s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1;}50%{opacity:0.45;} }

  .progress-section { margin-bottom:16px; }
  .progress-labels { display:flex; justify-content:space-between; font-size:0.76rem; color:var(--sub); font-weight:600; margin-bottom:5px; }
  .progress-bar { height:13px; background:#f0ebe5; border-radius:99px; overflow:hidden; box-shadow:inset 0 2px 4px rgba(0,0,0,0.07); }
  .progress-fill {
    height:100%; border-radius:99px;
    background:linear-gradient(90deg, #c8b4e8, #ffb3c6, #f0c040);
    transition:width 0.9s cubic-bezier(0.34,1.56,0.64,1);
    position:relative; overflow:hidden;
  }
  .progress-fill::after {
    content:''; position:absolute; top:0; left:-100%; width:100%; height:100%;
    background:linear-gradient(90deg,transparent,rgba(255,255,255,0.55),transparent);
    animation:shimmer 2.5s infinite;
  }
  @keyframes shimmer { to { left:200%; } }

  .day-row { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; gap:10px; }
  .day-box {
    background:linear-gradient(135deg,#fef3ff,#fff3f8);
    border:1.5px solid #f0d4f0; border-radius:18px;
    padding:10px 14px; text-align:center; flex-shrink:0;
  }
  .day-box .num { font-size:1.9rem; font-weight:900; color:var(--text); line-height:1; }
  .day-box .num span { font-size:0.9rem; font-weight:600; color:var(--sub); }
  .day-msg-box {
    background:#f8f5ff; border:1.5px solid #e8d8f8; border-radius:16px;
    padding:10px 14px; flex:1; font-size:0.83rem; color:var(--text); font-weight:500; line-height:1.5;
  }

  .stamp-btn {
    width:100%; padding:15px; border:none; border-radius:20px;
    font-family:'Zen Maru Gothic',sans-serif; font-size:1.05rem; font-weight:700; color:white;
    cursor:pointer; display:flex; align-items:center; justify-content:center; gap:8px;
    background:linear-gradient(135deg,var(--pink),var(--pink2));
    box-shadow:0 4px 16px rgba(255,100,140,0.32);
    transition:all 0.2s; text-shadow:0 1px 2px rgba(0,0,0,0.14);
  }
  .stamp-btn:hover:not(:disabled) { transform:translateY(-2px); box-shadow:0 6px 22px rgba(255,100,140,0.42); }
  .stamp-btn:disabled { background:linear-gradient(135deg,#d4c4b8,#c4b4a8); box-shadow:none; cursor:not-allowed; }
  .stamp-btn.done { background:linear-gradient(135deg,var(--green),var(--green2)); box-shadow:0 4px 16px rgba(100,180,100,0.32); }

  .milestone-alert {
    display:none; border-radius:20px; padding:14px 18px;
    text-align:center; margin-bottom:16px; font-size:0.85rem;
    font-weight:700; border:2px solid transparent;
    animation:fadeSlide 0.5s ease;
  }
  .milestone-alert.show { display:block; }
  @keyframes fadeSlide { from{opacity:0;transform:translateY(-8px);}to{opacity:1;transform:none;} }

  .cal-card {
    background:white; border-radius:28px; padding:20px 18px;
    box-shadow:0 8px 40px var(--shadow);
    border:2px solid rgba(255,255,255,0.85);
  }
  .cal-title { font-size:0.9rem; font-weight:700; color:var(--text); margin-bottom:14px; }
  .cal-grid { display:grid; grid-template-columns:repeat(6,1fr); gap:5px; }
  .cal-day {
    aspect-ratio:1; border-radius:10px; display:flex; align-items:center; justify-content:center;
    font-size:0.7rem; font-weight:700; background:#f5f0ea; color:#bba898;
    border:1.5px solid transparent; transition:all 0.3s; position:relative;
  }
  .cal-day.done { background:linear-gradient(135deg,#ffe8f0,#f0e0ff); color:var(--text); border-color:#f0c0d8; }
  .cal-day.done::after { content:'🐑'; position:absolute; font-size:11px; bottom:-2px; right:-1px; }
  .cal-day.milestone-done { background:linear-gradient(135deg,#ffe880,#ffcf70); border-color:#e8b040; }
  .cal-day.milestone-done::after { content:'🌟'; font-size:12px; bottom:-2px; right:-1px; }
  .cal-day.milestone-upcoming { background:linear-gradient(135deg,#fff0b0,#ffe0d0); border-color:#f0c070; }
  .cal-day.milestone-upcoming::after { content:'⭐'; font-size:12px; bottom:-2px; right:-1px; }
  .cal-day.today {
    background:linear-gradient(135deg,var(--pink),var(--lavender)); color:white;
    box-shadow:0 2px 10px rgba(200,100,180,0.35); transform:scale(1.12); z-index:1;
  }
  .cal-day.today::after { display:none; }
  .cal-day.future { opacity:0.45; }

  .reset-btn {
    display:block; margin:16px auto 0; background:none; border:none;
    font-family:'Zen Maru Gothic',sans-serif; font-size:0.73rem; color:#c4b4a8;
    cursor:pointer; text-decoration:underline; padding:4px 8px;
  }
  .reset-btn:hover { color:var(--text); }

  .completion {
    background:linear-gradient(135deg,#fffbd0,#ffe8f8,#e8d8ff);
    border-radius:26px; padding:22px; text-align:center;
    margin-bottom:18px; border:2px solid #f0d8c0; display:none;
  }
  .completion.show { display:block; animation:fadeSlide 0.6s ease; }
  .completion .big { font-size:3.8rem; display:block; margin-bottom:10px; }
  .completion h2 { font-size:1.3rem; font-weight:900; color:var(--text); }
  .completion p { font-size:0.82rem; color:var(--sub); margin-top:6px; line-height:1.6; }

  .popup-overlay {
    position:fixed; inset:0; background:rgba(0,0,0,0.32); z-index:100;
    display:flex; align-items:center; justify-content:center;
    opacity:0; pointer-events:none; transition:opacity 0.3s;
  }
  .popup-overlay.show { opacity:1; pointer-events:all; }
  .popup {
    background:white; border-radius:32px; padding:34px 30px; text-align:center;
    transform:scale(0.7) translateY(40px);
    transition:transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
    max-width:300px; width:90%; box-shadow:0 20px 60px rgba(0,0,0,0.18);
  }
  .popup-overlay.show .popup { transform:scale(1) translateY(0); }
  .popup .pe { font-size:3.5rem; display:block; margin-bottom:10px; }
  .popup h2 { font-size:1.35rem; font-weight:900; color:var(--text); margin-bottom:8px; }
  .popup p { font-size:0.84rem; color:var(--sub); line-height:1.65; white-space:pre-line; }
  .popup-close {
    margin-top:20px; padding:12px 34px;
    background:linear-gradient(135deg,var(--pink),var(--lavender));
    border:none; border-radius:99px; font-family:'Zen Maru Gothic',sans-serif;
    font-size:1rem; font-weight:700; color:white; cursor:pointer;
    box-shadow:0 4px 16px rgba(200,100,180,0.28);
  }

  .particle {
    position:fixed; pointer-events:none; z-index:200; border-radius:50%;
    animation:fall linear forwards;
  }
  @keyframes fall {
    0%{transform:translateY(0) rotate(0deg);opacity:1;}
    100%{transform:translateY(700px) rotate(900deg);opacity:0;}
  }

  /* ── Loading overlay ── */
  .loading-overlay {
    position:fixed; inset:0; background:linear-gradient(160deg,#dff0ff,#f4e8ff,#ffe4f0);
    z-index:300; display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:16px; transition:opacity 0.5s;
  }
  .loading-overlay.hide { opacity:0; pointer-events:none; }
  .loading-sheep { font-size:3.5rem; animation:bounce 0.7s ease-in-out infinite alternate; }
  @keyframes bounce { from{transform:translateY(0);} to{transform:translateY(-12px);} }
  .loading-text { font-size:0.9rem; color:var(--sub); font-weight:600; }
  .loading-dots::after { content:''; animation:dots 1.5s steps(4,end) infinite; }
  @keyframes dots { 0%{content:'';}25%{content:'.';}50%{content:'..';}75%{content:'...';}100%{content:'';} }

  /* ── Error banner ── */
  .error-banner {
    display:none; background:#fff0f0; border:2px solid #ffb0b0; border-radius:16px;
    padding:12px 16px; text-align:center; margin-bottom:14px;
    font-size:0.82rem; color:#c04040; font-weight:600;
  }
  .error-banner.show { display:block; animation:fadeSlide 0.4s ease; }

  /* ── Saving indicator ── */
  .saving-badge {
    position:fixed; bottom:24px; right:16px; z-index:50;
    background:white; border-radius:99px; padding:8px 14px;
    font-size:0.75rem; font-weight:700; color:var(--sub);
    box-shadow:0 4px 16px var(--shadow); border:1.5px solid #f0e8e0;
    display:flex; align-items:center; gap:6px;
    opacity:0; transform:translateY(8px);
    transition:opacity 0.3s, transform 0.3s; pointer-events:none;
  }
  .saving-badge.show { opacity:1; transform:translateY(0); }
  .saving-dot { width:7px; height:7px; border-radius:50%; background:var(--green2); }
  .saving-dot.spin {
    background:none; border:2px solid var(--lavender); border-top-color:transparent;
    animation:spin 0.7s linear infinite;
  }
  @keyframes spin { to{transform:rotate(360deg);} }
</style>
</head>
<body>

<div class="clouds"><div class="cloud"></div><div class="cloud"></div><div class="cloud"></div></div>

<!-- ローディング画面 -->
<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-sheep">🐑</div>
  <div class="loading-text">データを読み込み中<span class="loading-dots"></span></div>
</div>

<!-- 保存インジケーター -->
<div class="saving-badge" id="savingBadge">
  <div class="saving-dot" id="savingDot"></div>
  <span id="savingText">保存中...</span>
</div>

<div class="app">
  <div class="header">
    <h1>🌙 ねむりの羊 🐑</h1>
    <p>30日間 睡眠サポートプログラム</p>
  </div>

  <div class="completion" id="completion">
    <span class="big">🧶</span>
    <h2>セーター完成！🎉</h2>
    <p>30日間、本当におつかれさまでした！<br>羊の毛でとびきりかわいいセーターができたよ♪</p>
  </div>

  <div class="error-banner" id="errorBanner">⚠️ データの保存に失敗しました。ローカルには保存済みです。</div>

  <div class="milestone-alert" id="milestoneAlert"></div>

  <div class="card">
    <div class="stage-badge" id="stageBadge">🌱 はじまりのステージ</div>

    <div class="day-row">
      <div class="day-box"><div class="num" id="dayNum">1<span>日目</span></div></div>
      <div class="day-msg-box" id="dayMsg">今日も運動してみよう！🌙</div>
    </div>

    <div class="sheep-scene">
      <div class="sheep-wrapper" id="sheepWrapper" onclick="tapSheep()">
        <svg class="sheep-svg" viewBox="0 0 200 210" xmlns="http://www.w3.org/2000/svg">
          <!-- Ground -->
          <ellipse cx="100" cy="194" rx="68" ry="9" fill="#c0e4a0" opacity="0.55"/>
          <path d="M55 191 Q53 180 57 175 Q61 180 59 191" fill="#7bc47b" opacity="0.7"/>
          <path d="M148 192 Q146 181 150 176 Q154 181 152 192" fill="#7bc47b" opacity="0.65"/>
          <path d="M78 193 Q76 184 79 180 Q82 184 81 193" fill="#7bc47b" opacity="0.5"/>
          <path d="M128 192 Q126 183 129 179 Q132 183 131 192" fill="#7bc47b" opacity="0.5"/>

          <!-- Legs -->
          <rect x="73" y="155" width="11" height="32" rx="5.5" fill="#c8b090"/>
          <rect x="90" y="157" width="11" height="30" rx="5.5" fill="#c8b090"/>
          <rect x="109" y="155" width="11" height="32" rx="5.5" fill="#c8b090"/>
          <rect x="126" y="157" width="11" height="30" rx="5.5" fill="#c8b090"/>
          <ellipse cx="78.5" cy="187" rx="7" ry="3.5" fill="#8b6040"/>
          <ellipse cx="95.5" cy="187" rx="7" ry="3.5" fill="#8b6040"/>
          <ellipse cx="114.5" cy="187" rx="7" ry="3.5" fill="#8b6040"/>
          <ellipse cx="131.5" cy="187" rx="7" ry="3.5" fill="#8b6040"/>

          <!-- Base body -->
          <ellipse cx="102" cy="135" rx="50" ry="40" fill="#f5f0e8" stroke="#e0d0b8" stroke-width="1.5"/>

          <!-- WOOL PUFFS (appear day by day) -->
          <circle class="wp" data-day="1"  cx="90"  cy="122" r="0" fill="#fffcf5"/>
          <circle class="wp" data-day="2"  cx="114" cy="122" r="0" fill="#fffcf5"/>
          <circle class="wp" data-day="3"  cx="102" cy="115" r="0" fill="#fffcf5"/>
          <circle class="wp" data-day="4"  cx="76"  cy="128" r="0" fill="#fffcf5"/>
          <circle class="wp" data-day="5"  cx="128" cy="128" r="0" fill="#fffcf5"/>
          <circle class="wp" data-day="6"  cx="84"  cy="112" r="0" fill="#fffcf5"/>
          <circle class="wp" data-day="7"  cx="120" cy="112" r="0" fill="#fffcf5"/>
          <circle class="wp" data-day="8"  cx="65"  cy="120" r="0" fill="#fffcf5"/>
          <circle class="wp" data-day="9"  cx="138" cy="120" r="0" fill="#fffcf5"/>
          <circle class="wp" data-day="10" cx="102" cy="104" r="0" fill="#fff8f0"/>
          <circle class="wp" data-day="11" cx="74"  cy="108" r="0" fill="#fff8f0"/>
          <circle class="wp" data-day="12" cx="130" cy="108" r="0" fill="#fff8f0"/>
          <circle class="wp" data-day="13" cx="60"  cy="132" r="0" fill="#fff8f0"/>
          <circle class="wp" data-day="14" cx="143" cy="132" r="0" fill="#fff8f0"/>
          <circle class="wp" data-day="15" cx="102" cy="97"  r="0" fill="#fff8f0"/>
          <circle class="wp" data-day="16" cx="86"  cy="145" r="0" fill="#fff0e8"/>
          <circle class="wp" data-day="17" cx="118" cy="145" r="0" fill="#fff0e8"/>
          <circle class="wp" data-day="18" cx="57"  cy="110" r="0" fill="#fff0e8"/>
          <circle class="wp" data-day="19" cx="146" cy="110" r="0" fill="#fff0e8"/>
          <circle class="wp" data-day="20" cx="102" cy="90"  r="0" fill="#fff0e8"/>
          <circle class="wp" data-day="21" cx="70"  cy="100" r="0" fill="#ffe8d8"/>
          <circle class="wp" data-day="22" cx="134" cy="100" r="0" fill="#ffe8d8"/>
          <circle class="wp" data-day="23" cx="55"  cy="142" r="0" fill="#ffe8d8"/>
          <circle class="wp" data-day="24" cx="148" cy="142" r="0" fill="#ffe8d8"/>
          <circle class="wp" data-day="25" cx="102" cy="83"  r="0" fill="#ffe0c8"/>
          <circle class="wp" data-day="26" cx="80"  cy="152" r="0" fill="#ffe0c8"/>
          <circle class="wp" data-day="27" cx="124" cy="152" r="0" fill="#ffe0c8"/>
          <circle class="wp" data-day="28" cx="52"  cy="125" r="0" fill="#ffd8b8"/>
          <circle class="wp" data-day="29" cx="152" cy="125" r="0" fill="#ffd8b8"/>
          <circle class="wp" data-day="30" cx="102" cy="76"  r="0" fill="#ffd0a8"/>

          <!-- MILESTONE ACCESSORIES (every 3 days) -->
          <!-- Day 3: flower -->
          <g id="a3" opacity="0" style="transition:opacity 0.8s">
            <circle cx="78" cy="80" r="5.5" fill="#ffb3c6" opacity="0.9"/>
            <circle cx="73" cy="76" r="3.5" fill="#ffb3c6" opacity="0.8"/>
            <circle cx="83" cy="76" r="3.5" fill="#ffb3c6" opacity="0.8"/>
            <circle cx="73" cy="84" r="3.5" fill="#ffb3c6" opacity="0.8"/>
            <circle cx="83" cy="84" r="3.5" fill="#ffb3c6" opacity="0.8"/>
            <circle cx="78" cy="80" r="2.5" fill="#ffd8a0"/>
          </g>
          <!-- Day 6: star on forehead -->
          <g id="a6" opacity="0" style="transition:opacity 0.8s">
            <text x="96" y="73" font-size="14" text-anchor="middle">⭐</text>
          </g>
          <!-- Day 9: heart cheeks -->
          <g id="a9" opacity="0" style="transition:opacity 0.8s">
            <text x="83"  y="101" font-size="10">💕</text>
            <text x="107" y="101" font-size="10">💕</text>
          </g>
          <!-- Day 12: bow -->
          <g id="a12" opacity="0" style="transition:opacity 0.8s">
            <path d="M93 74 Q100 68 107 74 Q100 80 93 74Z" fill="#ffb3c6"/>
            <path d="M93 74 Q100 80 107 74 Q100 68 93 74Z" fill="#ff8fab" opacity="0.65"/>
            <circle cx="100" cy="74" r="2.5" fill="#ff4080"/>
          </g>
          <!-- Day 15: gold necklace -->
          <g id="a15" opacity="0" style="transition:opacity 0.8s">
            <path d="M84 110 Q102 106 120 110" stroke="#f0c040" stroke-width="2" fill="none" stroke-linecap="round"/>
            <circle cx="102" cy="107" r="3"   fill="#f0c040"/>
            <circle cx="92"  cy="109" r="2"   fill="#f0c040" opacity="0.85"/>
            <circle cx="112" cy="109" r="2"   fill="#f0c040" opacity="0.85"/>
          </g>
          <!-- Day 18: rainbow above -->
          <g id="a18" opacity="0" style="transition:opacity 0.8s">
            <path d="M58 92 Q100 52 142 92" stroke="#ff8fab" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.85"/>
            <path d="M62 97 Q100 60 138 97" stroke="#f0c040" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.85"/>
            <path d="M66 102 Q100 68 134 102" stroke="#a8d8a8" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.85"/>
          </g>
          <!-- Day 21: crescent moon -->
          <g id="a21" opacity="0" style="transition:opacity 0.8s">
            <path d="M92 65 Q97 52 112 58 Q100 52 92 65Z" fill="#f0c040"/>
          </g>
          <!-- Day 24: sweater dots pattern -->
          <g id="a24" opacity="0" style="transition:opacity 0.8s">
            <circle cx="88"  cy="126" r="2.5" fill="#f0c080" opacity="0.85"/>
            <circle cx="102" cy="122" r="2.5" fill="#f0a0c0" opacity="0.85"/>
            <circle cx="116" cy="126" r="2.5" fill="#c0b0f0" opacity="0.85"/>

];

// ─── State ────────────────────────────────────────────────
let stamps = [], todayDone = false;

// ─── ローディング表示 ─────────────────────────────────────
function hideLoading() {
  const ov = document.getElementById('loadingOverlay');
  ov.classList.add('hide');
  setTimeout(() => ov.style.display = 'none', 500);
}

// ─── 保存インジケーター ───────────────────────────────────
function showSaving(text, spinning = true) {
  const badge = document.getElementById('savingBadge');
  const dot   = document.getElementById('savingDot');
  const txt   = document.getElementById('savingText');
  txt.textContent = text;
  dot.className = 'saving-dot' + (spinning ? ' spin' : '');
  badge.classList.add('show');
}
function hideSaving(successText = null) {
  const badge = document.getElementById('savingBadge');
  if (successText) {
    document.getElementById('savingText').textContent = successText;
    document.getElementById('savingDot').className = 'saving-dot';
    setTimeout(() => badge.classList.remove('show'), 1800);
  } else {
    badge.classList.remove('show');
  }
}

// ─── Google Sheets 通信 ───────────────────────────────────
async function load() {
  // まずローカルから読み込んで即表示（体感速度UP）
  try {
    const local = localStorage.getItem(LS_KEY);
    if (local) {
      stamps = JSON.parse(local);
      const today = new Date().toDateString();
      if (stamps.length && stamps[stamps.length-1] === today) todayDone = true;
    }
  } catch(e) {}

  // GAS URLが設定されていない場合はローカルのみで動作
  if (!GAS_URL || GAS_URL.includes('ここに')) {
    hideLoading();
    return;
  }

  // スプレッドシートから最新データを取得
  try {
    const res = await fetch(`${GAS_URL}?id=${encodeURIComponent(USER_ID)}`);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    if (data.stamps) {
      const remote = JSON.parse(data.stamps);
      // リモートのスタンプ数が多い場合はリモートを優先
      if (remote.length >= stamps.length) {
        stamps = remote;
        todayDone = false;
        const today = new Date().toDateString();
        if (stamps.length && stamps[stamps.length-1] === today) todayDone = true;
        // ローカルにも保存
        localStorage.setItem(LS_KEY, JSON.stringify(stamps));
      }
    }
  } catch(e) {
    console.warn('スプシ読み込み失敗（ローカルデータを使用）:', e);
    // エラーバナーは出さずにローカルで続行
  } finally {
    hideLoading();
  }
}

async function save() {
  // ローカルには必ず保存（オフライン対策）
  try { localStorage.setItem(LS_KEY, JSON.stringify(stamps)); } catch(e) {}

  // GAS URLが未設定の場合はローカルのみ
  if (!GAS_URL || GAS_URL.includes('ここに')) return;

  showSaving('保存中...', true);
  try {
    const res = await fetch(GAS_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' }, // GASのCORS対策
      body: JSON.stringify({
        id: USER_ID,
        stamps: JSON.stringify(stamps)
      })
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    if (data.status === 'success') {
      hideSaving('✅ 保存しました');
    } else {
      throw new Error('GAS error');
    }
  } catch(e) {
    console.warn('スプシ保存失敗:', e);
    hideSaving();
    // エラーバナーを表示
    const eb = document.getElementById('errorBanner');
    eb.classList.add('show');
    setTimeout(() => eb.classList.remove('show'), 5000);
  }
}

function cnt() { return stamps.length; }

function updateWool(n) {
  document.querySelectorAll('.wp').forEach(el => {
    const d = parseInt(el.dataset.day);
    el.setAttribute('r', n >= d ? (WOOL_R[d]||12) : 0);
  });
  // Milestone accessories
  [3,6,9,12,15,18,21,24,27,30].forEach(d => {
    const el = document.getElementById('a'+d);
    if (el) el.style.opacity = n >= d ? '1' : '0';
  });
  // Mouth
  const m = document.getElementById('mouth');
  if (m) {
    if (n >= 20) m.setAttribute('d','M94 102 Q100 107 106 102');
    else if (n >= 10) m.setAttribute('d','M95 102 Q100 106 105 102');
    else m.setAttribute('d','M96 102 Q100 105 104 102');
  }
  // Blush
  const op = (0.45 + (n/TOTAL)*0.35).toFixed(2);
  const bl = document.getElementById('blL'), br = document.getElementById('blR');
  if (bl) bl.setAttribute('opacity', op);
  if (br) br.setAttribute('opacity', op);
}

function getStage(n) {
  let st = STAGES[0];
  STAGES.forEach(s => { if (n >= s.d) st = s; });
  return st;
}

function updateUI() {
  const n = cnt();
  document.getElementById('progFill').style.width = (n/TOTAL*100)+'%';
  document.getElementById('progText').textContent = n+' / 30日';
  document.getElementById('dayNum').innerHTML = Math.min(n+1,30)+'<span>日目</span>';
  document.getElementById('dayMsg').textContent = MSGS[Math.min(n,29)];
  updateWool(n);

  const st = getStage(n);
  const badge = document.getElementById('stageBadge');
  badge.textContent = st.l;
  badge.style.background = st.bg;
  badge.style.border = '2px solid '+st.bc;
  badge.style.color = st.c;

  const btn = document.getElementById('stampBtn'), hint = document.getElementById('tapHint');
  if (todayDone || n >= TOTAL) {
    btn.textContent = n >= TOTAL ? '🧶 30日完了！おめでとう！' : '✅ 今日は記録済み！';
    btn.disabled = true; btn.className = 'stamp-btn done';
    hint.textContent = n >= TOTAL ? '🧶 セーター完成！' : '✅ 今日は完了！';
    hint.style.color = '#7bc47b'; hint.style.animation = 'none';
  } else {
    btn.textContent = '🐑 今日の運動を記録する';
    btn.disabled = false; btn.className = 'stamp-btn';
    hint.textContent = '👆 タップして記録！';
    hint.style.color = ''; hint.style.animation = '';
  }
  if (n >= TOTAL) document.getElementById('completion').classList.add('show');
  buildCal();
}

function buildCal() {
  const g = document.getElementById('calGrid'); g.innerHTML = '';
  const n = cnt();
  for (let i = 1; i <= TOTAL; i++) {
    const el = document.createElement('div'); el.className = 'cal-day'; el.textContent = i;
    const ms = MILESTONES.has(i);
    if (i <= n) el.classList.add(ms ? 'milestone-done' : 'done');
    else if (i === n+1 && !todayDone) el.classList.add('today');
    else { el.classList.add('future'); if (ms) el.classList.add('milestone-upcoming'); }
    g.appendChild(el);
  }
}

function tapSheep() {
  if (todayDone || cnt() >= TOTAL) return;
  const w = document.getElementById('sheepWrapper');
  w.style.transform = 'scale(1.1) rotate(4deg)';
  setTimeout(() => w.style.transform = 'scale(1) rotate(-2deg)', 110);
  setTimeout(() => w.style.transform = 'scale(1)', 230);
  document.getElementById('tapStars').style.opacity = '1';
  setTimeout(() => document.getElementById('tapStars').style.opacity = '0', 600);
}

async function doStamp() {
  if (todayDone || cnt() >= TOTAL) return;
  stamps.push(new Date().toDateString()); todayDone = true;
  await save(); // スプシに保存
  const n = cnt();
  const w = document.getElementById('sheepWrapper');
  w.style.transition = 'transform 0.35s cubic-bezier(0.34,1.56,0.64,1)';
  w.style.transform = 'scale(1.22)';
  setTimeout(() => w.style.transform = 'scale(1)', 350);

  launchParticles(MILESTONES.has(n) ? 38 : 18);
  updateUI();

  if (MILESTONES.has(n) && n < TOTAL) {
    const st = getStage(n), al = document.getElementById('milestoneAlert');
    al.textContent = '🎉 '+n+'日達成！'+st.l+'に突入！';
    al.style.background = st.bg; al.style.border = '2px solid '+st.bc; al.style.color = st.c;
    al.classList.remove('show'); void al.offsetWidth; al.classList.add('show');
    setTimeout(() => al.classList.remove('show'), 4500);
  }

  const pm = POPUPS[Math.min(n-1, POPUPS.length-1)];
  document.getElementById('pEmoji').textContent = pm.e;
  document.getElementById('pTitle').textContent = pm.t;
  document.getElementById('pMsg').textContent   = pm.m;
  document.getElementById('popupOverlay').classList.add('show');
}

function launchParticles(c) {
  const cols = ['#ffb3c6','#c8b4e8','#b8e4b8','#ffe08a','#ffd4e8','#d4c8ff','#b8f0d8','#ffd0a0'];
  const shapes = ['50%','20%','0%'];
  const cx = window.innerWidth/2, cy = window.innerHeight*0.4;
  for (let i = 0; i < c; i++) {
    const p = document.createElement('div'); p.className = 'particle';
    const sz = Math.random()*14+6;
    p.style.cssText = `left:${cx+(Math.random()-.5)*180}px;top:${cy}px;width:${sz}px;height:${sz}px;
      background:${cols[Math.floor(Math.random()*cols.length)]};
      border-radius:${shapes[Math.floor(Math.random()*shapes.length)]};
      animation-duration:${Math.random()*.9+.8}s;animation-delay:${Math.random()*.4}s;`;
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 2500);
  }
}

function closePopup() { document.getElementById('popupOverlay').classList.remove('show'); }

async function resetAll() {
  if (!confirm('30日の記録をすべてリセットしますか？')) return;
  stamps = []; todayDone = false;
  await save(); // スプシもリセット
  try { localStorage.removeItem(LS_KEY); } catch(e) {}
  document.getElementById('completion').classList.remove('show');
  updateUI();
}

// ─── 起動 ─────────────────────────────────────────────────
load().then(() => updateUI());
</script>
